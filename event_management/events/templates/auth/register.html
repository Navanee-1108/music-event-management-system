{% extends 'events/base.html' %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Register</h2>

    <form method="POST">
      
      <input type="hidden" name="next" value="{{ next }}">
      {% csrf_token %}

      <!-- 👤 Display name -->
      <input 
        type="text" 
        name="username" 
        placeholder="Full Name" 
        required
      >

      <!-- 📧 Unique login email -->
      <input 
        type="email" 
        name="email" 
        placeholder="Email Address" 
        required
      >

      <input 
        type="password" 
        name="password1" 
        placeholder="Password" 
        required
      >

      <input 
        type="password" 
        name="password2" 
        placeholder="Confirm Password" 
        required
      >

      <button class="submit-btn">Register</button>
    </form>

    {% for m in messages %}
      <p class="error-msg">{{ m }}</p>
    {% endfor %}

  </div>
</div>

{% endblock %}
