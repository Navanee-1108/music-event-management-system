{% extends 'events/base.html' %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Login</h2>

    <form method="POST">
      {% csrf_token %}

      <!-- ✅ EMAIL LOGIN -->
      <input 
        type="email" 
        name="email" 
        placeholder="Email Address" 
        required
      >

      <input 
        type="password" 
        name="password" 
        placeholder="Password" 
        required
      >

      <button class="submit-btn">Login</button>
    </form>

    <p>
      New user?
      <a href="{% url 'register' %}">Register here</a>
    </p>

    {% for m in messages %}
      <p class="error-msg">{{ m }}</p>
    {% endfor %}

  </div>
</div>

{% endblock %}
