<!DOCTYPE html>
<html>
<head>
<title>Admin Forgot Password</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#2563eb;
}

</style>

</head>

<body>

<div class="card">

<h2>Reset Admin Password</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Admin Username" required>

<input type="password" name="password" placeholder="New Password" required>

<button type="submit">Reset Password</button>

</form>

<a href="{% url 'admin_login' %}">Back to Login</a>

</div>

</body>
</html>
