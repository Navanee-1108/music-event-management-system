{% extends "custom_admin/admin_base.html" %} {% block content %}

<h2 class="add-service-title">Edit Service</h2>


<div class="add-service-wrapper">
  <form method="POST" enctype="multipart/form-data" class="add-service-form">
    {% csrf_token %}

    <input type="text" name="title" value="{{ event.title }}" required />

    <textarea name="description" rows="4">
{{ event.description }}
</textarea
    >

    <input type="text" name="duration" value="{{ event.duration }}" />

    <input type="number" name="price" value="{{ event.price }}" />

    <input type="file" name="image" />

    <button type="submit">Update Service</button>
  </form>
</div>

{% endblock %}
